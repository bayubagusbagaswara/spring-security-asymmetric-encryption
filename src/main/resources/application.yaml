spring:
  application:
    name: spring-security-asymmetric-encryption

  datasource:
    url: jdbc:postgresql://localhost:5432/spring_app_db
    username: username
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

app:
  security: